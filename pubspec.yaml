name: gp2_watad
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.1.0 # تم تعديله ليتوافق مع نسخة الـ SDK الخاصة بك

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.1.0
  timezone: ^0.10.1
  cupertino_icons: ^1.0.8
  intl: ^0.19.0

  # Firebase dependencies
  firebase_core: ^3.6.0
  firebase_database: ^11.1.3
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.4.3
  firebase_storage: ^12.3.3
  
  # File handling and UI
  file_picker: ^8.1.4
  dotted_border: ^3.1.0
  image_picker: ^1.0.7
  google_fonts: ^6.0.0
  http: ^1.2.0

  # PDF (Syncfusion 33+ — Android embedding compatible with current Flutter)
  syncfusion_flutter_pdf: ^33.2.4
  syncfusion_flutter_pdfviewer: ^33.2.4
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env